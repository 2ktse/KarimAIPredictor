<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karim AI Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#070b14;
--card:#121a2b;
--text:#eaf0ff;
--muted:#93a4b8;
--green:#19d38a;
--blue:#2b6fff;
--orange:#ff7a00;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:radial-gradient(circle at top,#101a33,#070b14);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:18px;
}

.container{
width:min(460px,100%);
background:rgba(18,26,43,0.92);
border:1px solid rgba(255,255,255,0.06);
border-radius:22px;
padding:24px;
box-shadow:0 0 60px rgba(0,0,0,0.8);
}

.logo{
text-align:center;
font-size:26px;
font-weight:900;
color:var(--green);
}

.subtitle{
text-align:center;
font-size:13px;
color:var(--muted);
margin-top:4px;
}

.badges{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
margin-bottom:12px;
}

.badge{
font-size:12px;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.07);
}

.section-title{
margin:14px 0 8px;
font-weight:800;
font-size:14px;
color:#cfe0ff;
}

/* GAME CARDS */
.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.game{
position:relative;
padding:12px;
border-radius:14px;
background:var(--card);
border:2px solid rgba(255,255,255,0.08);
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
transition:.2s;
font-weight:700;
overflow:hidden;
}

/* ICON BOX (casino style) */
.icon{
width:34px;
height:34px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.06);
font-size:18px;
}

/* ACTIVE */
.game.active{
border-color:var(--green);
box-shadow:0 0 14px rgba(25,211,138,0.35);
transform:scale(1.02);
}

/* MOST POPULAR BADGE */
.popular{
position:absolute;
top:6px;
left:6px;
font-size:10px;
background:linear-gradient(90deg,var(--orange),var(--green));
color:black;
padding:3px 6px;
border-radius:999px;
font-weight:900;
}

/* INPUT */
.input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:var(--card);
color:#fff;
margin-top:6px;
}

/* BUTTON */
.btn{
width:100%;
margin-top:14px;
padding:14px;
border:none;
border-radius:12px;
font-weight:900;
background:linear-gradient(90deg,var(--orange),var(--green));
color:#000;
cursor:pointer;
}

.btn:disabled{opacity:.5}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:var(--card);
padding:20px;
border-radius:16px;
width:90%;
max-width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
}

.popup-title{
color:var(--orange);
font-weight:900;
margin-bottom:10px;
}

.popup-btn{
margin-top:12px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:var(--green);
color:#000;
font-weight:800;
cursor:pointer;
}

/* TELEGRAM */
.telegram{
margin-top:12px;
display:block;
text-align:center;
padding:12px;
border-radius:12px;
background:#229ED9;
color:#fff;
font-weight:800;
text-decoration:none;
}

.meta{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:12px;
color:var(--muted);
}

#online{color:var(--green)}
</style>
</head>

<body>

<div class="container">

<div class="logo">Karim AI Predictor</div>
<div class="subtitle">AI Game Analytics • Egypt Dashboard</div>

<div class="badges">
<div class="badge">🔒 Secure</div>
<div class="badge">⚡ AI System</div>
<div class="badge">📊 Real-time</div>
<div class="badge">🇪🇬 Egypt</div>
</div>

<div class="section-title">اختر اللعبة</div>

<div class="games">

<div class="game active" data-game>
<div class="icon">✈️</div>
<div>Aviator</div>
<div class="popular">Popular</div>
</div>

<div class="game" data-game>
<div class="icon">💣</div>
<div>Mines</div>
</div>

<div class="game" data-game>
<div class="icon">🍎</div>
<div>Apple of Fortune</div>
</div>

<div class="game" data-game>
<div class="icon">⚽</div>
<div>Penalty</div>
</div>

<div class="game" data-game>
<div class="icon">🐔</div>
<div>Chicken Road</div>
</div>

</div>

<div class="section-title">معرف الحساب 1xbet</div>
<input class="input" id="acc" maxlength="10" placeholder="أدخل 10 أرقام">

<button class="btn" id="btn" disabled>بدء تحليل AI</button>

<a class="telegram" href="https://t.me/KarimHassan_bot" target="_blank">
Telegram Support
</a>

<div class="meta">
<div>⏳ 05:00</div>
<div>🟢 Live</div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<div class="popup-title">❌ لا يوجد إيداع</div>
<div>للمتابعة، يرجى إيداع مبلغ 200 EGP</div>
<button class="popup-btn" onclick="retry()">حاول مرة أخرى</button>
</div>
</div>

<script>

const games=document.querySelectorAll("[data-game]");

games.forEach(g=>{
g.addEventListener("click",()=>{
games.forEach(x=>x.classList.remove("active"));
g.classList.add("active");
});
});

const acc=document.getElementById("acc");
const btn=document.getElementById("btn");
const popup=document.getElementById("popup");

acc.addEventListener("input",()=>{
acc.value=acc.value.replace(/\D/g,'');
btn.disabled=acc.value.length!==10;
});

btn.addEventListener("click",()=>{
setTimeout(()=>{
popup.style.display="flex";
},1200);
});

function retry(){
popup.style.display="none";
}

</script>

</body>
</html>
